<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AetherEdge | Quantum Intelligence for Trading</title>
<meta name="description" content="AetherEdge の全公開スクリプトをカテゴリー別・人気ランキングで紹介。">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'ae-black': '#0A0A0A', 'ae-dark': '#111111', 'ae-panel': '#10101A',
        'ae-cyan': '#00D4FF', 'ae-emerald': '#00FF9F',
        'ae-magenta': '#FF00FF', 'ae-purple': '#9D00FF'
      },
      fontFamily: {
        orbitron: ['Orbitron', 'sans-serif'],
        rajdhani: ['Rajdhani', 'sans-serif'],
        mono: ['"JetBrains Mono"', '"IBM Plex Mono"', 'ui-monospace', 'monospace']
      }
    }
  }
};
</script>
<link rel="stylesheet" href="assets/style.css">
</head>

<body class="bg-ae-black text-gray-300 font-mono antialiased overflow-x-hidden" data-title-key="_title_scripts">

<!-- ===== Background layers ===== -->
<div aria-hidden="true" class="fixed inset-0 -z-30 bg-cover bg-center opacity-20 pointer-events-none"
     style="background-image:url('assets/bg.jpg'); filter:saturate(1.15) blur(1px);"></div>
<div aria-hidden="true" class="fixed inset-0 -z-20 pointer-events-none"
     style="background:
       radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,212,255,.07), transparent 60%),
       radial-gradient(ellipse 60% 50% at 85% 110%, rgba(157,0,255,.08), transparent 55%),
       linear-gradient(rgba(10,10,10,.55), rgba(10,10,10,.88));"></div>
<canvas id="quantum-canvas" aria-hidden="true" class="fixed inset-0 -z-10 pointer-events-none"></canvas>
<div class="scanlines" aria-hidden="true"></div>

<!-- ===== Navigation ===== -->
<header id="navbar" class="fixed top-0 inset-x-0 z-50">
  <nav class="max-w-7xl mx-auto px-5 sm:px-8 h-[4.5rem] flex items-center justify-between gap-4">
    <a href="index.html" class="font-orbitron font-extrabold text-lg sm:text-xl tracking-[.18em] select-none">
      <span class="neon-text ng-cyan">AETHER</span><span class="neon-text ng-emerald">EDGE</span>
    </a>

    <ul class="hidden md:flex items-center gap-8 text-[.78rem] uppercase">
      <li><a class="nav-link text-gray-300" href="index.html">Home</a></li>
      <li><a class="nav-link text-ae-cyan" href="scripts.html">Scripts</a></li>
      <li><a class="nav-link text-gray-300" href="market.html">Market</a></li>
      <!-- ★EDIT: Blogリンク（noteなどのURLに差し替え） -->
      <li><a class="nav-link text-gray-300" href="https://note.com/" target="_blank" rel="noopener">Blog</a></li>
      <li><a class="nav-link text-gray-300" href="#contact">Contact</a></li>
      <li><button id="lang-toggle" class="lang-btn" type="button" aria-label="Switch language">EN</button></li>
      <li>
        <a href="https://jp.tradingview.com/u/AetherEdge/#published-scripts" target="_blank" rel="noopener"
           class="neon-button nb-cyan !px-5 !py-2 !text-[.7rem]">TradingView ↗</a>
      </li>
    </ul>

    <div class="md:hidden flex items-center gap-3">
      <button id="lang-toggle-m" class="lang-btn" type="button" aria-label="Switch language">EN</button>
      <button id="menu-btn" aria-label="Menu" aria-expanded="false" class="p-2 text-ae-cyan" type="button">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="filter:drop-shadow(0 0 6px rgba(0,212,255,.8))">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </button>
    </div>
  </nav>

  <div id="mobile-menu" class="md:hidden bg-[rgba(10,10,13,.95)] backdrop-blur-md border-b border-ae-cyan/25">
    <ul class="px-6 py-4 space-y-4 text-sm uppercase tracking-[.18em]">
      <li><a class="block py-1 text-gray-200" href="index.html">Home</a></li>
      <li><a class="block py-1 text-ae-cyan" href="scripts.html">Scripts</a></li>
      <li><a class="block py-1 text-gray-200" href="market.html">Market</a></li>
      <!-- ★EDIT: Blogリンク（noteなどのURLに差し替え） -->
      <li><a class="block py-1 text-gray-200" href="https://note.com/" target="_blank" rel="noopener">Blog</a></li>
      <li><a class="block py-1 text-gray-200" href="#contact">Contact</a></li>
      <li><a class="block py-1 text-ae-cyan" href="https://jp.tradingview.com/u/AetherEdge/#published-scripts" target="_blank" rel="noopener">TradingView ↗</a></li>
    </ul>
  </div>
</header>

<main>
  <!-- ===== Live ticker tape ===== -->
  <div class="pt-[4.5rem] relative z-10 border-b border-ae-cyan/15" style="background:rgba(8,8,12,.6)">
    <div id="tv-ticker" class="min-h-[46px]"></div>
  </div>

  <!-- ===== Catalog head ===== -->
  <section class="relative max-w-7xl mx-auto px-5 sm:px-8 pt-16 pb-6">
    <p class="eyebrow font-mono">// SCRIPTS_CATALOG<span class="caret">▮</span></p>
    <h1 class="font-orbitron font-black uppercase text-4xl sm:text-5xl mt-3 grad-text tracking-wider">Script Catalog</h1>
    <p class="mt-5 text-sm text-gray-400 max-w-2xl leading-7" data-i18n="scr_sub"></p>
    <p class="mt-2 text-[.68rem] tracking-[.18em] uppercase text-ae-emerald/80" data-i18n="sc_updated"></p>
    <div class="neon-divider mt-8"></div>
  </section>

  <!-- ===== Catalog ===== -->
  <section id="catalog" class="relative max-w-7xl mx-auto px-5 sm:px-8 pb-24">
    <div class="mt-4 space-y-5">
      <div class="flex flex-col sm:flex-row sm:items-center gap-4 justify-between">
        <div class="flex gap-3">
          <button class="type-tab active" data-type="indicator" type="button" data-i18n="tab_ind"></button>
          <button class="type-tab" data-type="strategy" type="button" data-i18n="tab_str"></button>
        </div>
        <div class="relative w-full sm:w-72">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-ae-cyan/70 text-sm pointer-events-none">⌕</span>
          <input id="script-search" class="neon-input" type="text" autocomplete="off">
        </div>
      </div>
      <div class="flex gap-6 border-b border-white/5">
        <button class="view-tab active" data-view="cat" type="button" data-i18n="view_cat"></button>
        <button class="view-tab" data-view="rank" type="button" data-i18n="view_rank"></button>
      </div>
      <div id="cat-chips" class="flex gap-2.5 overflow-x-auto pb-2 -mx-1 px-1"></div>
    </div>

    <div id="script-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-7 mt-10"></div>

    <p class="text-center mt-12">
      <a href="https://jp.tradingview.com/u/AetherEdge/#published-scripts" target="_blank" rel="noopener"
         class="neon-button nb-purple" data-i18n="scr_all_btn"></a>
    </p>
  </section>

</main>

<!-- ===== Footer ===== -->
<footer id="contact" class="relative border-t border-ae-cyan/20" style="background:rgba(8,8,11,.85); box-shadow:0 -4px 40px rgba(0,212,255,.06)">
  <div class="max-w-7xl mx-auto px-5 sm:px-8 py-14 grid md:grid-cols-3 gap-10">
    <div>
      <p class="font-orbitron font-extrabold text-lg tracking-[.18em]">
        <span class="neon-text ng-cyan">AETHER</span><span class="neon-text ng-emerald">EDGE</span>
      </p>
      <p class="text-[.74rem] leading-6 text-gray-500 mt-4" data-i18n="ft_tag"></p>
      <div class="flex items-center gap-2.5 mt-5 text-[.66rem] tracking-[.2em] uppercase text-ae-emerald/90">
        <span class="status-dot"></span> System Status: Online
      </div>
    </div>

    <div>
      <p class="text-[.7rem] tracking-[.28em] uppercase text-gray-500">Navigate</p>
      <ul class="mt-4 space-y-2.5 text-[.8rem]">
        <li><a class="hover:text-ae-cyan transition-colors" href="index.html">Home</a></li>
        <li><a class="hover:text-ae-cyan transition-colors" href="scripts.html">Scripts</a></li>
        <li><a class="hover:text-ae-cyan transition-colors" href="market.html">Market</a></li>
        <li><a class="hover:text-ae-cyan transition-colors" href="index.html#about">About</a></li>
      </ul>
    </div>

    <div>
      <p class="text-[.7rem] tracking-[.28em] uppercase text-gray-500">Connect</p>
      <div class="flex gap-3 mt-4">
        <a href="https://jp.tradingview.com/u/AetherEdge/#published-scripts" target="_blank" rel="noopener" aria-label="TradingView"
           class="neon-card nc-cyan w-11 h-11 flex items-center justify-center text-[.62rem] font-bold tracking-wider text-ae-cyan">TV</a>
        <a href="https://x.com/AetherEdge_EN" target="_blank" rel="noopener" aria-label="X (Twitter)"
           class="neon-card nc-emerald w-11 h-11 flex items-center justify-center text-sm font-bold text-ae-emerald">𝕏</a>
        <!-- ★EDIT: noteアカウントURLに差し替え -->
        <a href="https://note.com/" target="_blank" rel="noopener" aria-label="note"
           class="neon-card nc-purple w-11 h-11 flex items-center justify-center text-[.7rem] font-bold text-ae-purple">note</a>
      </div>
      <!-- ★EDIT: 連絡先メールアドレスに差し替え -->
      <p class="text-[.74rem] text-gray-500 mt-5"><span data-i18n="ft_contact"></span> <a class="text-ae-cyan/90 hover:text-ae-cyan" href="mailto:contact@example.com">contact@example.com</a></p>
    </div>
  </div>

  <div class="border-t border-white/5">
    <div class="max-w-7xl mx-auto px-5 sm:px-8 py-6 flex flex-col sm:flex-row gap-3 items-center justify-between">
      <p class="text-[.66rem] text-gray-600">© <span id="year">2026</span> AetherEdge. All rights reserved.</p>
      <p class="text-[.62rem] leading-5 text-gray-600 sm:text-right max-w-xl" data-i18n="ft_disclaimer"></p>
    </div>
  </div>
</footer>

<script src="data/scripts-data.js"></script>
<script src="assets/common.js"></script>
