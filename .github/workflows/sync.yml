name: Sync TradingView catalog

on:
  schedule:
    - cron: '0 */6 * * *'   # 6時間ごとに自動同期
  workflow_dispatch:          # 手動実行も可能

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run sync (titles / boosts / new scripts)
        run: node tools/sync-tradingview.mjs

      - name: Enrich descriptions (LLM, optional)
        env:
          POE_API_KEY: ${{ secrets.POE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$POE_API_KEY" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "No LLM API key set (POE_API_KEY / ANTHROPIC_API_KEY) — skipping enrichment."
            exit 0
          fi
          node tools/enrich-descriptions.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "ae-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/scripts-data.js
          git diff --cached --quiet || (git commit -m "chore: sync TradingView catalog + descriptions" && git push)
